<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recommendation System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    color:white;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:42px;
}

.subtitle{
    text-align:center;
    margin-bottom:40px;
    font-size:18px;
    color:#dcdcdc;
}

.category-box{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.category-btn{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#1e3c72;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.category-btn:hover{
    transform:scale(1.05);
}

.search-box{
    text-align:center;
    margin-bottom:40px;
}

input{
    width:70%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.recommendation-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    color:black;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
}

.rating{
    color:orange;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

    <h1> Smart Recommendation System</h1>

    <p class="subtitle">
        Get personalized recommendations for Movies, Books, and Games
    </p>

    <div class="category-box">
        <button class="category-btn" onclick="filterItems('all')">All</button>
        <button class="category-btn" onclick="filterItems('movie')">Movies</button>
        <button class="category-btn" onclick="filterItems('book')">Books</button>
        <button class="category-btn" onclick="filterItems('game')">Games</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search recommendations..." onkeyup="searchItems()">
    </div>

    <div class="recommendation-grid" id="recommendationGrid"></div>

</div>

<script>

const recommendations = [

{
    title:"Interstellar",
    category:"movie",
    image:"https://images.unsplash.com/photo-1489599849927-2ee91cede3ba",
    description:"A science fiction movie based on space exploration.",
    rating:"⭐⭐⭐⭐⭐"
},

{
    title:"Atomic Habits",
    category:"book",
    image:"https://images.unsplash.com/photo-1512820790803-83ca734da794",
    description:"A self-improvement book for building good habits.",
    rating:"⭐⭐⭐⭐⭐"
},

{
    title:"Minecraft",
    category:"game",
    image:"https://images.unsplash.com/photo-1542751110-97427bbecf20",
    description:"Creative sandbox game with survival adventures.",
    rating:"⭐⭐⭐⭐"
},

{
    title:"Inception",
    category:"movie",
    image:"https://images.unsplash.com/photo-1440404653325-ab127d49abc1",
    description:"Mind-bending thriller based on dreams.",
    rating:"⭐⭐⭐⭐⭐"
},

{
    title:"Rich Dad Poor Dad",
    category:"book",
    image:"https://images.unsplash.com/photo-1495446815901-a7297e633e8d",
    description:"Book about money management and financial growth.",
    rating:"⭐⭐⭐⭐"
},

{
    title:"FIFA 25",
    category:"game",
    image:"https://images.unsplash.com/photo-1511512578047-dfb367046420",
    description:"Popular football simulation game.",
    rating:"⭐⭐⭐⭐⭐"
}

];


// Display recommendations
function displayItems(items){

    const grid = document.getElementById("recommendationGrid");

    grid.innerHTML = "";

    items.forEach(item => {

        grid.innerHTML += `

        <div class="card">

            <img src="${item.image}" alt="${item.title}">

            <div class="card-content">

                <h3>${item.title}</h3>

                <p>${item.description}</p>

                <div class="rating">${item.rating}</div>

            </div>

        </div>

        `;
    });
}


// Filter category
function filterItems(category){

    if(category === "all"){

        displayItems(recommendations);

    }else{

        const filtered = recommendations.filter(item => item.category === category);

        displayItems(filtered);
    }
}


// Search functionality
function searchItems(){

    const value = document.getElementById("searchInput").value.toLowerCase();

    const filtered = recommendations.filter(item => {

        return item.title.toLowerCase().includes(value) ||
               item.description.toLowerCase().includes(value);

    });

    displayItems(filtered);
}


// Initial Load
displayItems(recommendations);

</script>

</body>
</html>
